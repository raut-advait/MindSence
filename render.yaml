services:
  - type: web
    name: mindsense-student-mental-health
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindsense-postgres
          property: connectionString
      - key: FLASK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant

databases:
  - name: mindsense-postgres
    plan: free
