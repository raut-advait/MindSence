<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your free MindSense account">
    <title>Register — MindSense</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="shortcut icon" href="/static/favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="navbar-logo icon-20"><i data-lucide="brain"></i></div>
        <span class="navbar-title">MindSense</span>
    </a>
    <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/login" class="btn-nav">Login</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Set up your student wellness profile.</p>
            </div>

            <form id="registerForm" action="/register" method="POST" novalidate>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="user"></i></span><input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="mail"></i></span><input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="lock"></i></span><input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6" autocomplete="new-password"></div>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="calendar"></i></span><input type="date" id="dob" name="dob" required></div>
                </div>

                <div class="form-group">
                    <label for="age">Age (years)</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="hourglass"></i></span><input type="number" id="age" name="age" min="15" max="80"></div>
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="users"></i></span>
                        <select id="gender" name="gender" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="department">Department / Faculty</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="building-2"></i></span>
                        <select id="department" name="department">
                            <option value="" selected>Select department</option>
                            <option value="Computer Engineering">Computer Engineering</option>
                            <option value="Information Technology (IT)">Information Technology (IT)</option>
                            <option value="CSEDS">CSEDS</option>
                            <option value="AIML">AIML</option>
                            <option value="AIDS">AIDS</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="academic_year">Year</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="layers"></i></span>
                        <select id="academic_year" name="academic_year">
                            <option value="" selected>Select year</option>
                            <option value="FE">FE</option>
                            <option value="SE">SE</option>
                            <option value="TE">TE</option>
                            <option value="BE">BE</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cgpa">CGPA (0.00 – 10.00)</label>
                    <div class="input-wrapper"><span class="input-icon"><i data-lucide="graduation-cap"></i></span><input type="number" step="0.01" id="cgpa" name="cgpa" min="0" max="10"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
            </form>

            <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
        const name = document.getElementById('name').value.trim();
        const password = document.getElementById('password').value;
        if (!name || name.length < 2) {
            e.preventDefault();
            alert('Please enter a valid full name.');
            return;
        }
        if (password.length < 6) {
            e.preventDefault();
            alert('Password must be at least 6 characters.');
            return;
        }
        const btn = document.getElementById('registerBtn');
        btn.textContent = 'Creating account...';
        btn.disabled = true;
    });
    lucide.createIcons();
</script>
<script src="/static/theme.js"></script>
</body>
</html>
