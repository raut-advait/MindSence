<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily mental health tips and wellness advice">
    <title>Daily Tips — MindSense</title>
    <link rel="stylesheet" href="/static/style.css">
        <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
        <link rel="shortcut icon" href="/static/favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tips-shell {
            display: grid;
            gap: 16px;
            max-width: 1260px;
            margin: 0 auto;
        }

        .tips-category-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .tips-item {
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 14px;
            background: linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
            min-height: 94px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        .tips-item-title {
            font-size: 1.02rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.25;
        }

        .tips-item-copy {
            font-size: .9rem;
            color: var(--text-secondary);
            line-height: 1.45;
        }

        .tips-of-day {
            font-size: 1rem;
            line-height: 1.55;
            color: var(--text-secondary);
            padding: 4px 2px 2px;
        }

        @media (max-width: 1023px) {
            .tips-category-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 767px) {
            .main-body { padding: 14px !important; }
            .tips-shell { gap: 14px; }
            .tips-item { min-height: auto; padding: 12px; }
        }

        @media (max-width: 479px) {
            .tips-of-day { font-size: .92rem; }
        }
    </style>
</head>
<body>
<div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
        <a href="/" class="sidebar-brand">
            <div class="sidebar-brand-icon icon-20"><i data-lucide="brain"></i></div>
            <div class="sidebar-brand-text">MindSense<span>Student Portal</span></div>
        </a>
        <nav class="sidebar-nav">
            <div class="sidebar-section-title">Main</div>
            <a href="/student-dashboard" class="sidebar-link"><span class="link-icon"><i data-lucide="layout-dashboard"></i></span>Dashboard</a>
            <a href="/test" class="sidebar-link"><span class="link-icon"><i data-lucide="clipboard-check"></i></span>Take a Test</a>
            <a href="/history" class="sidebar-link"><span class="link-icon"><i data-lucide="history"></i></span>History</a>
            <a href="/analytics" class="sidebar-link"><span class="link-icon"><i data-lucide="chart-no-axes-combined"></i></span>Analytics</a>
            <div class="sidebar-section-title">Wellness</div>
            <a href="/resources" class="sidebar-link"><span class="link-icon"><i data-lucide="book-open"></i></span>Resources</a>
            <a href="/daily-tips" class="sidebar-link active"><span class="link-icon"><i data-lucide="lightbulb"></i></span>Daily Tips</a>
        </nav>
        <div class="sidebar-footer">
            <button class="account-card" id="accountToggle" type="button">
                <div class="left">
                    <div class="sidebar-avatar">{{ session['user'][0].upper() }}</div>
                    <div>
                        <div class="sidebar-user-name">{{ session['name'] if session.get('name') else session['user'] }}</div>
                        <div class="sidebar-user-role">Student</div>
                    </div>
                </div>
                <span class="icon-16"><i data-lucide="ellipsis"></i></span>
            </button>
            <div class="account-popover" id="accountMenu">
                <a href="/logout"><span class="icon-16"><i data-lucide="log-out"></i></span> Logout</a>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="main-header">
            <div class="main-header-title">
                <h1>Daily Tips</h1>
                <p>Actionable ideas for sleep, focus, stress, and resilience</p>
            </div>
            <a href="/test" class="btn btn-primary btn-sm">Take Assessment</a>
        </div>

        <div class="main-body">
            <div class="tips-shell">
            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="sparkles"></i></span>Tip of the Day</div>
                <p id="tipsOfDay" class="tips-of-day"></p>
            </section>

            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="moon"></i></span>Sleep & Rest</div>
                <div id="sleepTips" class="tips-category-grid"></div>
            </section>
            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="shield"></i></span>Stress Management</div>
                <div id="stressTips" class="tips-category-grid"></div>
            </section>
            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="activity"></i></span>Physical Activity</div>
                <div id="physicalTips" class="tips-category-grid"></div>
            </section>
            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="users"></i></span>Social Connection</div>
                <div id="socialTips" class="tips-category-grid"></div>
            </section>
            <section class="chart-container" style="padding:18px;">
                <div class="section-title"><span class="icon-24"><i data-lucide="sprout"></i></span>Personal Growth</div>
                <div id="growthTips" class="tips-category-grid"></div>
            </section>
            </div>
        </div>
    </main>
</div>

<script>
const allTips = {
    tipsOfDay: [
        "Start your day with intention: pick your top three priorities.",
        "Get natural daylight in the morning to support your sleep cycle.",
        "Reach out to one person today for a short check-in.",
        "Write three things you are grateful for before bed.",
        "Play calm music during study breaks to reset your mood."
    ],
    sleep: [
        { title: "Follow a Sleep Schedule", desc: "Try consistent sleep and wake times, including weekends." },
        { title: "Optimize Bedroom Setup", desc: "Keep your room dark, quiet, and cool for better sleep quality." },
        { title: "Reduce Night Screen Time", desc: "Pause phone and laptop use 30-60 minutes before sleeping." },
        { title: "Limit Late Caffeine", desc: "Avoid caffeine in the second half of your day." }
    ],
    stress: [
        { title: "Use 4-7-8 Breathing", desc: "Inhale 4 seconds, hold 7, exhale 8 to lower tension." },
        { title: "Try Muscle Relaxation", desc: "Tense and release each muscle group for physical calm." },
        { title: "Practice Mindfulness", desc: "10 minutes of focused breathing can improve concentration." },
        { title: "Break Work into Steps", desc: "Use small sub-tasks to reduce overwhelm." }
    ],
    physical: [
        { title: "Walk Daily", desc: "A short walk helps with mood regulation and focus." },
        { title: "Stretch Between Sessions", desc: "Two to five minutes of stretching can reduce stiffness." },
        { title: "Try Intro Yoga", desc: "Beginner routines combine movement and breathing." },
        { title: "Hydrate Well", desc: "Regular hydration supports energy and mental clarity." }
    ],
    social: [
        { title: "Call a Friend", desc: "Voice conversations can feel more supportive than text." },
        { title: "Join a Community", desc: "Participate in clubs or groups that match your interests." },
        { title: "Schedule Check-ins", desc: "Recurring social plans improve consistency and connection." },
        { title: "Ask for Help", desc: "Seeking support early is a strength, not a weakness." }
    ],
    growth: [
        { title: "Journal Daily", desc: "A few written lines can clear mental noise quickly." },
        { title: "Learn One New Skill", desc: "Small progress builds confidence and momentum." },
        { title: "Read 20 Minutes", desc: "Reading can lower stress and improve mental recovery." },
        { title: "Set Boundaries", desc: "Protect focused time and rest with clear limits." }
    ]
};

const tipIndex = new Date().getDate() % allTips.tipsOfDay.length;
document.getElementById('tipsOfDay').textContent = allTips.tipsOfDay[tipIndex];

function renderTips(containerId, tipsArray) {
    const container = document.getElementById(containerId);
    tipsArray.forEach(tip => {
        container.innerHTML += `
            <article class="tips-item">
                <div class="tips-item-title">${tip.title}</div>
                <div class="tips-item-copy">${tip.desc}</div>
            </article>
        `;
    });
}

renderTips('sleepTips', allTips.sleep);
renderTips('stressTips', allTips.stress);
renderTips('physicalTips', allTips.physical);
renderTips('socialTips', allTips.social);
renderTips('growthTips', allTips.growth);

 document.getElementById('accountToggle').addEventListener('click', () => {
    document.getElementById('accountMenu').classList.toggle('open');
 });

lucide.createIcons();
</script>
<script src="/static/theme.js"></script>
</body>
</html>
