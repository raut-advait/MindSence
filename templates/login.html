<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your MindSense account">
    <title>Login — MindSense</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="shortcut icon" href="/static/favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="navbar-logo icon-20"><i data-lucide="brain"></i></div>
        <span class="navbar-title">MindSense</span>
    </a>
    <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/register" class="btn-nav">Register</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="auth-card">
            <div class="auth-header">
                <h2>Sign In</h2>
                <p>Continue your mental health journey.</p>
            </div>

            <form id="loginForm" action="/login" method="POST" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="mail"></i></span>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i data-lucide="lock"></i></span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
            </form>

            <div class="auth-footer">Don't have an account? <a href="/register">Create one</a></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function () {
        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
    });
    lucide.createIcons();
</script>
<script src="/static/theme.js"></script>
</body>
</html>
